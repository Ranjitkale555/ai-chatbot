# docker-compose.yml
version: "3.9"

services:

  backend:
    build: .
    container_name: pdf_chatbot_backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build: .
    container_name: pdf_chatbot_frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped
